<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0f14">
<meta name="apple-mobile-web-app-title" content="Trading Ops">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="config/icon-180.png">
<link rel="icon" type="image/png" href="config/icon-192.png">
<title>Trading Operations Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#0c0f14;
  --panel:#141922;
  --panel-2:#1b212d;
  --line:#252d3a;
  --line-soft:#1f2630;
  --txt:#e6ebf2;
  --txt-dim:#8a94a6;
  --txt-faint:#5b6577;
  --accent:#4ade80;
  --accent-dim:#22c55e;
  --loss:#f87171;
  --warn:#fbbf24;
  --info:#60a5fa;
  --radius:10px;
  --mono:'SF Mono',ui-monospace,'Cascadia Code','Roboto Mono',Menlo,Consolas,monospace;
  --sans:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
body{
  background:var(--ink);
  color:var(--txt);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  overscroll-behavior:none;
}
button{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:#33405266}

/* ---------- Layout shell ---------- */
.app{display:flex;height:100vh;height:100dvh;width:100vw}
.sidebar{
  width:236px;flex-shrink:0;background:var(--panel);
  border-right:1px solid var(--line);display:flex;flex-direction:column;
  transition:transform .22s ease;
  padding-top:env(safe-area-inset-top);
  padding-left:env(safe-area-inset-left);
}
.brand{
  padding:20px 20px 16px;border-bottom:1px solid var(--line-soft);
  display:flex;align-items:center;gap:11px;
}
.brand-mark{
  width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-dim));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--ink);font-size:15px;font-family:var(--mono);
}
.brand-text h1{font-size:13px;font-weight:600;letter-spacing:.02em;line-height:1.2}
.brand-text span{font-size:10.5px;color:var(--txt-faint);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase}
.nav{flex:1;overflow-y:auto;padding:12px 10px}
.nav-group{margin-bottom:6px}
.nav-label{
  font-size:10px;text-transform:uppercase;letter-spacing:.09em;
  color:var(--txt-faint);padding:12px 12px 6px;font-weight:600;
}
.nav-item{
  display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:7px;
  cursor:pointer;color:var(--txt-dim);font-size:13px;font-weight:500;
  transition:background .12s,color .12s;user-select:none;
}
.nav-item:hover{background:var(--panel-2);color:var(--txt)}
.nav-item.active{background:var(--panel-2);color:var(--txt)}
.nav-item.active .nav-ico{color:var(--accent)}
.nav-ico{width:17px;height:17px;flex-shrink:0;color:var(--txt-faint);transition:color .12s}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--txt-faint);background:var(--ink);padding:1px 6px;border-radius:10px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{
  height:56px;flex-shrink:0;border-bottom:1px solid var(--line);
  display:flex;align-items:center;padding:0 24px;gap:16px;background:var(--panel);
  padding-top:env(safe-area-inset-top);
  padding-right:max(24px,env(safe-area-inset-right));
  box-sizing:content-box;
}
.topbar h2{font-size:16px;font-weight:600;letter-spacing:.01em}
.topbar .sub{color:var(--txt-faint);font-size:12px;font-family:var(--mono)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.hamburger{display:none;background:none;border:none;color:var(--txt);cursor:pointer;padding:8px;margin-left:-8px;border-radius:7px}
.hamburger:active{background:var(--panel-2)}

.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;padding-bottom:max(24px,env(safe-area-inset-bottom));padding-right:max(24px,env(safe-area-inset-right))}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- Buttons & inputs ---------- */
.btn{
  font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;
  border:1px solid var(--line);background:var(--panel-2);color:var(--txt);
  padding:8px 14px;border-radius:7px;display:inline-flex;align-items:center;gap:7px;
  transition:all .12s;white-space:nowrap;
}
.btn:hover{border-color:#33405a;background:#222a38}
.btn-primary{background:var(--accent);color:var(--ink);border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-dim);border-color:var(--accent-dim)}
.btn-danger{color:var(--loss);border-color:#3a2630}
.btn-danger:hover{background:#2a1a1f;border-color:#5a3640}
.btn-ghost{background:transparent;border-color:transparent;color:var(--txt-dim)}
.btn-ghost:hover{background:var(--panel-2);color:var(--txt)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn svg{width:15px;height:15px}

label{display:block;font-size:12px;color:var(--txt-dim);margin-bottom:5px;font-weight:500}
input,select,textarea{
  width:100%;font-family:var(--sans);font-size:16px;color:var(--txt);
  background:var(--ink);border:1px solid var(--line);border-radius:7px;
  padding:9px 11px;transition:border-color .12s;
}
@media(min-width:761px){
  input,select,textarea{font-size:13px}
  input[type=number]{font-size:13px}
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent-dim)}
input[type=number]{font-family:var(--mono)}
textarea{resize:vertical;min-height:70px;line-height:1.5}
.field{margin-bottom:14px}
.field-row{display:grid;gap:14px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:repeat(4,1fr)}

/* ---------- Cards ---------- */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.card-head{display:flex;align-items:center;margin-bottom:16px;gap:10px}
.card-head h3{font-size:14px;font-weight:600}
.card-head .actions{margin-left:auto;display:flex;gap:8px}
.card-sub{font-size:11.5px;color:var(--txt-faint);font-family:var(--mono)}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:18px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;position:relative;overflow:hidden}
.stat .k{font-size:11px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:7px}
.stat .v{font-size:23px;font-weight:600;font-family:var(--mono);letter-spacing:-.01em}
.stat .meta{font-size:11px;color:var(--txt-faint);font-family:var(--mono);margin-top:3px}
.stat .spark{position:absolute;right:0;bottom:0;width:60px;height:32px;opacity:.5}
.pos{color:var(--accent)}
.neg{color:var(--loss)}
.dim{color:var(--txt-dim)}

.dash-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px}
.chart-wrap{position:relative;height:300px}
.chart-wrap.sm{height:220px}

/* ---------- Table ---------- */
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{
  text-align:left;padding:11px 13px;background:var(--panel-2);
  font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;
  color:var(--txt-dim);font-weight:600;border-bottom:1px solid var(--line);
  white-space:nowrap;position:sticky;top:0;
}
td{padding:10px 13px;border-bottom:1px solid var(--line-soft);white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--panel-2)}
.num{font-family:var(--mono);text-align:right}
.tag{
  display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;
  font-family:var(--mono);
}
.tag-long{background:#10241a;color:var(--accent)}
.tag-short{background:#2a161b;color:var(--loss)}
.tag-grade{background:var(--panel-2);border:1px solid var(--line)}
.grade-A{color:var(--accent)}.grade-B{color:var(--info)}.grade-C{color:var(--warn)}.grade-D{color:var(--loss)}
.empty{text-align:center;padding:48px 20px;color:var(--txt-faint)}
.empty svg{width:38px;height:38px;margin-bottom:12px;opacity:.4}
.empty p{font-size:13px;margin-bottom:4px;color:var(--txt-dim)}
.empty span{font-size:12px}

/* ---------- Modal ---------- */
.modal-bg{
  position:fixed;inset:0;background:#05070be0;display:none;z-index:100;
  align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;
  backdrop-filter:blur(2px);
}
.modal-bg.open{display:flex}
.modal{
  background:var(--panel);border:1px solid var(--line);border-radius:14px;
  width:100%;max-width:640px;animation:pop .2s ease;margin:auto;
}
.modal.wide{max-width:860px}
@keyframes pop{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:none}}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center}
.modal-head h3{font-size:15px;font-weight:600}
.modal-head .close{margin-left:auto;background:none;border:none;color:var(--txt-dim);cursor:pointer;padding:4px;border-radius:5px}
.modal-head .close:hover{background:var(--panel-2);color:var(--txt)}
.modal-body{padding:22px;max-height:calc(100vh - 220px);overflow-y:auto}
.modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

/* ---------- Misc ---------- */
.row{display:flex;align-items:center;gap:10px}
.spread{justify-content:space-between}
.wrap{flex-wrap:wrap}
.mb{margin-bottom:16px}
.section-title{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--txt-dim);font-weight:600;margin:22px 0 12px}
.divider{height:1px;background:var(--line-soft);margin:18px 0}
.pill{font-size:11px;font-family:var(--mono);padding:3px 9px;border-radius:20px;background:var(--panel-2);border:1px solid var(--line);color:var(--txt-dim)}
.checklist-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.checklist-item:hover{border-color:#33405a;background:var(--panel-2)}
.checklist-item.checked{border-color:var(--accent-dim);background:#0f1d16}
.checkbox{width:19px;height:19px;border:2px solid var(--line);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .12s}
.checklist-item.checked .checkbox{background:var(--accent);border-color:var(--accent)}
.checklist-item.checked .checkbox svg{display:block}
.checkbox svg{display:none;width:13px;height:13px;color:var(--ink)}
.toast{
  position:fixed;bottom:22px;right:22px;background:var(--panel-2);border:1px solid var(--line);
  padding:12px 18px;border-radius:9px;font-size:13px;z-index:200;display:flex;align-items:center;gap:10px;
  box-shadow:0 12px 40px #0008;animation:slideup .25s ease;max-width:340px;
}
@keyframes slideup{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.toast.ok{border-left:3px solid var(--accent)}
.toast.err{border-left:3px solid var(--loss)}
.toast.warn{border-left:3px solid var(--warn)}
.score-bar{height:6px;background:var(--ink);border-radius:4px;overflow:hidden;margin-top:8px}
.score-fill{height:100%;border-radius:4px;transition:width .4s ease}
.range-wrap{display:flex;align-items:center;gap:12px}
.range-wrap input[type=range]{flex:1;padding:0}
.range-val{font-family:var(--mono);font-size:14px;font-weight:600;min-width:28px;text-align:right}
.ai-out{background:var(--ink);border:1px solid var(--line);border-radius:9px;padding:18px;font-size:13px;line-height:1.7;white-space:pre-wrap}
.ai-out h4{color:var(--accent);font-size:13px;margin:14px 0 6px;font-weight:600}
.ai-out h4:first-child{margin-top:0}
.spinner{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.kvs{display:grid;grid-template-columns:auto 1fr;gap:8px 18px;font-size:12.5px}
.kvs .k{color:var(--txt-dim)}
.kvs .v{font-family:var(--mono);text-align:right}
.lib-card,.lesson-card{border:1px solid var(--line);border-radius:9px;padding:14px;margin-bottom:10px;transition:border-color .12s}
.lib-card:hover,.lesson-card:hover{border-color:#33405a}
.lib-card .row,.lesson-card .row{margin-bottom:6px}
.note-meta{font-size:11px;color:var(--txt-faint);font-family:var(--mono)}
.bookprog{display:flex;gap:5px;margin-top:8px}
.bookprog .seg{flex:1;height:4px;border-radius:2px;background:var(--line)}
.bookprog .seg.on{background:var(--accent)}

/* ---------- Backup reminder banner ---------- */
.backup-banner{
  display:none;align-items:center;gap:12px;margin:0 0 16px;padding:12px 16px;
  background:linear-gradient(90deg,#2a210f,#1f1a0d);border:1px solid #4a3a16;
  border-radius:var(--radius);font-size:13px;
}
.backup-banner.show{display:flex}
.backup-banner .bb-ico{color:var(--warn);flex-shrink:0;display:flex}
.backup-banner .bb-text{flex:1;min-width:0}
.backup-banner .bb-text b{color:var(--warn)}
.backup-banner .bb-actions{display:flex;gap:8px;flex-shrink:0}
@media(max-width:760px){
  .backup-banner{flex-wrap:wrap}
  .backup-banner .bb-actions{width:100%}
  .backup-banner .bb-actions .btn{flex:1;justify-content:center}
}

/* ---------- Sidebar backdrop (mobile) ---------- */
.backdrop{display:none;position:fixed;inset:0;background:#05070bb0;z-index:80;backdrop-filter:blur(1px)}
.backdrop.open{display:block}

/* Tablet (iPad portrait, mid Android tablets) */
@media(max-width:1024px){
  .dash-grid{grid-template-columns:1fr}
}
@media(max-width:920px){
  .field-row.grid-3,.field-row.grid-4{grid-template-columns:1fr 1fr}
}
/* Phones & narrow tablets: collapse sidebar to drawer */
@media(max-width:760px){
  .sidebar{
    position:fixed;z-index:90;top:0;bottom:0;height:100%;width:min(82vw,300px);
    transform:translateX(-105%);box-shadow:0 0 60px #000a;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .sidebar.open{transform:none}
  .hamburger{display:block}
  .nav-item{padding:12px 14px;font-size:14px}
  .nav-ico{width:19px;height:19px}
  .field-row.grid-2,.field-row.grid-3,.field-row.grid-4{grid-template-columns:1fr}
  .content{padding:16px}
  .stat-grid{grid-template-columns:1fr 1fr;gap:10px}
  .stat{padding:13px 14px}
  .stat .v{font-size:20px}
  .card{padding:15px}
  .btn{padding:10px 14px}
  .btn-sm{padding:8px 12px}
  /* modal becomes a bottom sheet that fills the screen */
  .modal-bg{padding:0;align-items:flex-end}
  .modal,.modal.wide{max-width:100%;border-radius:16px 16px 0 0;max-height:94vh;max-height:94dvh;display:flex;flex-direction:column;margin:0}
  .modal-body{max-height:none;flex:1;padding:18px;padding-bottom:max(18px,env(safe-area-inset-bottom))}
  .modal-foot{flex-wrap:wrap;padding-bottom:max(16px,env(safe-area-inset-bottom))}
  .modal-foot .btn{flex:1;justify-content:center;min-width:120px}
  .topbar h2{font-size:15px}
  .chart-wrap{height:240px}
  .chart-wrap.sm{height:200px}
  .toast{left:16px;right:16px;bottom:max(16px,env(safe-area-inset-bottom));max-width:none}
  th,td{padding:9px 10px}
  .cf-cols{grid-template-columns:1fr!important}
}
@media(max-width:380px){
  .stat-grid{grid-template-columns:1fr}
}
/* coarse pointer = touch: kill hover states that "stick" on tap */
@media(hover:none){
  .nav-item:hover{background:transparent;color:var(--txt-dim)}
  .nav-item.active:hover{background:var(--panel-2);color:var(--txt)}
  tbody tr:hover{background:transparent}
  .btn:hover{border-color:var(--line);background:var(--panel-2)}
  .btn-primary:hover{background:var(--accent);border-color:var(--accent)}
  .lib-card:hover,.lesson-card:hover{border-color:var(--line)}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-mark">TO</div>
      <div class="brand-text">
        <h1>Trading Ops</h1>
        <span>Production Desk</span>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
  </aside>
  <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div>
        <h2 id="viewTitle">Dashboard</h2>
      </div>
      <div class="topbar-right" id="topbarRight"></div>
    </div>
    <div class="content" id="content">
      <div class="backup-banner" id="backupBanner">
        <span class="bb-ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></span>
        <span class="bb-text" id="backupBannerText"></span>
        <span class="bb-actions">
          <button class="btn btn-sm" onclick="dismissBackupBanner()">Later</button>
          <button class="btn btn-primary btn-sm" onclick="exportData()">Export now</button>
        </span>
      </div>
      <div id="viewRoot"></div>
    </div>
  </div>
</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalEl"></div></div>
<script>
/* ============================================================
   TRADING OPERATIONS PLATFORM  — single-file browser app
   Data persists in localStorage. Export/Import JSON for backup.
   ============================================================ */

const STORE_KEY = 'tradeops_v1';
const SCHEMA_VERSION = 1;

/* ---------- Default operational checklists (seed; editable thereafter) ---------- */
function defaultOpsChecklists(){
  return [
    {id:'daily', title:'Daily Operational Checklist', sub:'30–60 min/day', groups:[
      {id:'g_pre', name:'1. Pre-Market Sign-Off (10 min)', items:[
        {id:'d_env', t:'Environment check: open chart platform, load SPY & QQQ'},
        {id:'d_macro', t:'Identify macro trend: HH/HL (up), LH/LL (down), or sideways (range)'},
        {id:'d_infra', t:'Identify key infrastructure: draw nearest major support & resistance'},
        {id:'d_ready', t:'Readiness confirmation: today is data collection, not prediction'}
      ]},
      {id:'g_live', name:'2. Live Session Observation (10 min)', items:[
        {id:'d_candle', t:'Candlestick validation: watch body vs wick at S/R zones'},
        {id:'d_emo', t:'Emotional control: label any buy/sell impulse, step away, record it'},
        {id:'d_iso', t:'Strategy isolation: hunt only one selected setup (Phase 3)'}
      ]},
      {id:'g_pir', name:'3. Post-Incident Review / PIR (10 min)', items:[
        {id:'d_doc', t:'Document the day: final screenshot — did S/R levels hold?'},
        {id:'d_ledger', t:'Update the ledger: log all 7 fields for any paper trade'},
        {id:'d_read', t:'Curriculum progress: 15–30 min reading / Trading in the Zone'}
      ]}
    ]},
    {id:'weekly', title:'Weekly Quality Assurance (QA) Checklist', sub:'every weekend', groups:[
      {id:'g_p1', name:'Phase 1 (Wk 1–4): Market Foundations', items:[
        {id:'w1', t:'Wk1: Can I articulate ETF (e.g. VOO) vs index differences?'},
        {id:'w2', t:'Wk2: 5 screenshots of candlestick structures (Doji, Hammer, Engulfing)?'},
        {id:'w3', t:'Wk3: Audited 10 charts and categorized macro trend correctly?'},

let state = loadState();

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return seedExample(blankState());
    const parsed = JSON.parse(raw);
    return migrate(parsed);
  }catch(e){
    console.error('Load failed, starting fresh', e);
    return blankState();
  }
}
function migrate(s){
  if(!s.schema) s.schema = 1;
  const base = blankState();
  // ensure all keys exist
  for(const k in base){ if(!(k in s)) s[k]=base[k]; }
  // Backfill capital ledger: if empty but a startingCapital exists, seed it as the first deposit
  if((!s.capital || !s.capital.length) && s.settings && Number(s.settings.startingCapital)>0){
    s.capital=[{id:uid(),datetime:s.created||Date.now(),type:'deposit',amount:Number(s.settings.startingCapital),note:'Initial capital'}];
  }
  if(!Array.isArray(s.capital)) s.capital=[];
  // Seed editable operational checklists from the default if not present
  if(!s.opsChecklists || !Array.isArray(s.opsChecklists) || !s.opsChecklists.length){
    s.opsChecklists = defaultOpsChecklists();
  }
  return s;
}

/* ============================================================
   METRICS ENGINE
   ============================================================ */
function netPL(t){
  // prefer explicit net, else gross - commission
  if(t.netPL!=null && t.netPL!=='') return Number(t.netPL);
  const g = Number(t.grossPL)||0;
  const c = Number(t.commission)||0;
  return g - c;
}
function rMultiple(t){
  const risk = Number(t.riskAmount);
  if(!risk || risk<=0) return null;
  return netPL(t)/risk;
}
function closedTrades(){ return state.trades.filter(t=>t.netPL!=null && t.netPL!=='' || (t.grossPL!=null&&t.grossPL!=='')); }

function computeMetrics(){
  const ts = state.trades.slice().sort((a,b)=>(a.datetime||0)-(b.datetime||0));
  const closed = ts.filter(t=>(t.netPL!=null&&t.netPL!=='')||(t.grossPL!=null&&t.grossPL!==''));
  const n = closed.length;
  let wins=0,losses=0,grossWin=0,grossLoss=0,sum=0;
  const rs=[];
  closed.forEach(t=>{
    const p=netPL(t); sum+=p;
    if(p>0){wins++;grossWin+=p;} else if(p<0){losses++;grossLoss+=Math.abs(p);}
    const r=rMultiple(t); if(r!=null) rs.push(r);
  });
  const winRate = n? (wins/n*100):0;
  const profitFactor = grossLoss>0? grossWin/grossLoss : (grossWin>0?Infinity:0);
  const avgWin = wins? grossWin/wins : 0;
  const avgLoss = losses? grossLoss/losses : 0;
  // expectancy in $ per trade
  const expectancy = n? sum/n : 0;
  // expectancy in R
  const expectancyR = rs.length? rs.reduce((a,b)=>a+b,0)/rs.length : null;

  // ----- Capital ledger -----
  const deposits=totalDeposits();
  const withdrawals=totalWithdrawals();
  const capitalBase=deposits-withdrawals; // net invested capital

  // equity curve: combine capital transactions + closed trades on one timeline
  const events=[];
  (state.capital||[]).forEach(c=>events.push({ts:c.datetime||0, kind:'cap', delta:(c.type==='withdrawal'?-1:1)*(Number(c.amount)||0)}));
  closed.forEach(t=>events.push({ts:t.datetime||0, kind:'trade', delta:netPL(t), sym:t.symbol}));
  events.sort((a,b)=>a.ts-b.ts);
  let eq=0;
  const curve=[{x:'Start',y:0,ts:state.created}];
  events.forEach(e=>{ eq+=e.delta; curve.push({x:e.kind==='trade'?(e.sym||''):'＄',y:eq,ts:e.ts}); });
  const finalEquity=eq; // = capitalBase + trading P/L

  // max drawdown (only meaningful over the equity path)
  let peak=-Infinity,maxDD=0,maxDDpct=0;
  curve.forEach(p=>{
    if(p.y>peak)peak=p.y;
    const dd=peak-p.y;
    if(dd>maxDD){maxDD=dd; maxDDpct=peak>0?dd/peak*100:0;}
  });

  // streaks
  let curStreak=0,curType=null,maxWinStreak=0,maxLossStreak=0;
  closed.forEach(t=>{
    const p=netPL(t);
    const type=p>0?'w':p<0?'l':'n';
    if(type==='n')return;
    if(type===curType){curStreak++;}else{curType=type;curStreak=1;}
    if(type==='w')maxWinStreak=Math.max(maxWinStreak,curStreak);
    else maxLossStreak=Math.max(maxLossStreak,curStreak);
  });

  // total return = trading P/L as % of net capital invested
  const totalReturnPct = capitalBase>0? (sum/capitalBase*100) : 0;

  // discipline score: avg rule compliance from psych + checklist completeness on trades
  let disc = computeDisciplineScore(closed);
  // risk score: how well risk is controlled (0-100)
  let riskScore = computeRiskScore(closed,rs);

  return {n,wins,losses,winRate,profitFactor,avgWin,avgLoss,expectancy,expectancyR,
    netTotal:sum,curve,finalEquity,maxDD,maxDDpct,maxWinStreak,maxLossStreak,
    totalReturnPct,disc,riskScore,rs,
    deposits,withdrawals,capitalBase};
}

function computeDisciplineScore(closed){
  // blend: trade checklist completion + psych rule-compliance answers
  let pts=0,tot=0;
  state.trades.forEach(t=>{
    if(t.checklist && t.checklist.length){
      pts += t.checklist.filter(Boolean).length;
      tot += t.checklist.length;
    }
  });
  let psychComp=null;
  if(state.psych.length){
    const c = state.psych.filter(p=>p.compliance==='yes').length;
    psychComp = c/state.psych.length*100;
  }
  let checklistScore = tot? pts/tot*100 : null;
  if(checklistScore==null && psychComp==null) return null;
  if(checklistScore==null) return Math.round(psychComp);
  if(psychComp==null) return Math.round(checklistScore);
  return Math.round(checklistScore*0.6 + psychComp*0.4);
}

function computeRiskScore(closed,rs){
  if(!closed.length) return null;
  let score=100;
  // penalty if any trade lost more than 1.5x its planned risk (stop discipline)
  let blown=0;
  closed.forEach(t=>{
    const r=rMultiple(t);
    if(r!=null && r<-1.5) blown++;
  });
  if(closed.length) score -= (blown/closed.length)*60;
  // penalty for missing risk amounts (can't measure = risk unknown)
  const missing = closed.filter(t=>!t.riskAmount||Number(t.riskAmount)<=0).length;
  score -= (missing/closed.length)*25;
  // penalty for large loss streak
  return Math.max(0,Math.round(score));
}

function statRow(m){

    {k:'Win Rate', v:m.n?pct(m.winRate,0):'—', cls:'', meta:`${m.wins}W / ${m.losses}L`},
    {k:'Profit Factor', v:m.profitFactor===Infinity?'∞':m.profitFactor.toFixed(2), cls:m.profitFactor>=1?'pos':'neg', meta:'gross win ÷ loss'},
    {k:'Expectancy', v:money(m.expectancy), cls:m.expectancy>=0?'pos':'neg', meta:m.expectancyR!=null?m.expectancyR.toFixed(2)+'R / trade':'per trade'},
    {k:'Max Drawdown', v:moneyShort(-m.maxDD), cls:'neg', meta:pct(m.maxDDpct)+' peak'},
    {k:'Equity', v:moneyShort(m.finalEquity), cls:'', meta:'on '+moneyShort(m.capitalBase)+' capital'},

function scoreBlock(label,val,sub){

/* ---------- Dashboard charts ---------- */
const CHART_FONT = {family:"'SF Mono',ui-monospace,monospace",size:10};
function gridColor(){return '#252d3a'}
function baseScale(extra={}){
  return Object.assign({
    grid:{color:gridColor(),drawBorder:false},
    ticks:{color:'#8a94a6',font:CHART_FONT}
  },extra);
}
function drawEquity(m){
  const ctx=$('#cEquity'); if(!ctx)return;
  const labels=m.curve.map((p,i)=>i===0?'Start':'#'+i);
  const data=m.curve.map(p=>p.y);
  const grad=ctx.getContext('2d').createLinearGradient(0,0,0,300);
  grad.addColorStop(0,'#4ade8033'); grad.addColorStop(1,'#4ade8000');
  charts.eq=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:'#4ade80',backgroundColor:grad,fill:true,tension:.25,pointRadius:0,pointHoverRadius:4,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.parsed.y)}}},
    scales:{x:baseScale({ticks:{color:'#5b6577',font:CHART_FONT,maxTicksLimit:8}}),y:baseScale({ticks:{color:'#8a94a6',font:CHART_FONT,callback:v=>moneyShort(v)}})}}});
}
function monthlyBuckets(){
  const map={};
  closedTradesSorted().forEach(t=>{
    const d=new Date(t.datetime||Date.now());
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    map[key]=(map[key]||0)+netPL(t);
  });
  return map;
}
function closedTradesSorted(){
  return state.trades.filter(t=>(t.netPL!=null&&t.netPL!=='')||(t.grossPL!=null&&t.grossPL!=='')).sort((a,b)=>(a.datetime||0)-(b.datetime||0));
}
function drawMonthly(m){
  const ctx=$('#cMonthly'); if(!ctx)return;
  const map=monthlyBuckets();
  const labels=Object.keys(map).sort();
  const data=labels.map(k=>map[k]);
  charts.mo=new Chart(ctx,{type:'bar',data:{labels:labels.map(l=>{const[y,mo]=l.split('-');return new Date(y,mo-1).toLocaleDateString(undefined,{month:'short',year:'2-digit'})}),
    datasets:[{data,backgroundColor:data.map(v=>v>=0?'#4ade80aa':'#f87171aa'),borderColor:data.map(v=>v>=0?'#4ade80':'#f87171'),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.parsed.y)}}},
    scales:{x:baseScale(),y:baseScale({ticks:{color:'#8a94a6',font:CHART_FONT,callback:v=>moneyShort(v)}})}}});
}
function drawDaily(m){
  const ctx=$('#cDaily'); if(!ctx)return;
  const map={};
  closedTradesSorted().forEach(t=>{
    const d=new Date(t.datetime||Date.now());
    const key=d.toISOString().slice(0,10);
    map[key]=(map[key]||0)+netPL(t);
  });
  const keys=Object.keys(map).sort().slice(-30);
  const data=keys.map(k=>map[k]);
  charts.day=new Chart(ctx,{type:'bar',data:{labels:keys.map(k=>new Date(k).toLocaleDateString(undefined,{day:'2-digit',month:'short'})),
    datasets:[{data,backgroundColor:data.map(v=>v>=0?'#4ade80aa':'#f87171aa'),borderColor:data.map(v=>v>=0?'#4ade80':'#f87171'),borderWidth:1,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>money(c.parsed.y)}}},
    scales:{x:baseScale({ticks:{color:'#5b6577',font:CHART_FONT,maxTicksLimit:10}}),y:baseScale({ticks:{color:'#8a94a6',font:CHART_FONT,callback:v=>moneyShort(v)}})}}});
}

function num(id){ const v=$('#'+id).value; return v===''?null:Number(v); }
function saveTrade(id){
  const entry=num('f_entry'),stop=num('f_stop'),exit=num('f_exit'),size=num('f_size'),dir=$('#f_direction').value;
  let riskAmount=num('f_riskAmount');
  if(riskAmount==null && entry!=null && stop!=null && size!=null){
    riskAmount=Math.abs(entry-stop)*size;
  }
  let grossPL=num('f_grossPL');
  if(grossPL==null && entry!=null && exit!=null && size!=null){
    grossPL=(dir==='Short'?(entry-exit):(exit-entry))*size;
  }
  const data={
    datetime:new Date($('#f_datetime').value).getTime(),
    symbol:$('#f_symbol').value.trim().toUpperCase(),
    assetClass:$('#f_assetClass').value, direction:dir,
    strategyId:$('#f_strategyId').value, setupGrade:$('#f_setupGrade').value,
    entry,stop,target:num('f_target'),exit,size,riskAmount,
    commission:num('f_commission'), grossPL, netPL:num('f_netPL'),
    notes:$('#f_notes').value.trim(), screenshot:$('#f_screenshot').value.trim(),
    psychId:$('#f_psychId').value||null,
    lessonIds:(window._tradeLessonIds||[]).slice()
  };
  if(!data.symbol){ toast('Symbol is required','err'); return; }
  if(id){
    const t=state.trades.find(x=>x.id===id);
    Object.assign(t,data);
    toast('Trade updated');
  }else{
    data.id=uid(); data.checklist=window._pendingChecklist||null; window._pendingChecklist=null;
    state.trades.push(data);
    toast('Trade logged');
  }
  save(); closeModal(); buildNav(); renderView(currentView);
}
function deleteTrade(id){
  confirmDialog('Delete this trade permanently? This cannot be undone.',()=>{
    state.trades=state.trades.filter(t=>t.id!==id);
    save(); closeModal(); buildNav(); toast('Trade deleted','warn'); renderView(currentView);
  },true);
}

/* ---------- Trade linkage helpers ---------- */
function renderTradeLessonLinks(ids){
  if(!ids||!ids.length) return `<div class="note-meta" style="padding:6px 0">No lessons linked yet.</div>`;
  return ids.map(lid=>{
    const l=state.lessons.find(x=>x.id===lid);
    const label = l ? (l.mistake||'Lesson').slice(0,70) : '(deleted lesson)';
    return `<div class="row spread" style="padding:7px 11px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px">
      <span style="font-size:12.5px;color:var(--txt-dim)">▸ ${esc(label)}</span>
      <button type="button" class="btn btn-ghost btn-sm" onclick="unlinkLesson('${lid}')" title="Unlink">✕</button>
    </div>`;
  }).join('');
}
function refreshLessonLinks(){
  const el=$('#f_lessonsList'); if(el) el.innerHTML=renderTradeLessonLinks(window._tradeLessonIds);
}
function linkPickedLesson(){
  const sel=$('#f_lessonPick'); const id=sel.value;
  if(!id) return;
  window._tradeLessonIds=window._tradeLessonIds||[];
  if(!window._tradeLessonIds.includes(id)) window._tradeLessonIds.push(id);
  sel.value='';
  refreshLessonLinks();
}
function unlinkLesson(id){
  window._tradeLessonIds=(window._tradeLessonIds||[]).filter(x=>x!==id);
  refreshLessonLinks();
}
// Stash current trade-form values so a quick sub-form doesn't lose them
function stashTradeForm(){
  const ids=['f_datetime','f_symbol','f_assetClass','f_direction','f_strategyId','f_setupGrade',
    'f_entry','f_stop','f_target','f_exit','f_size','f_riskAmount','f_commission','f_grossPL','f_netPL','f_notes','f_screenshot','f_psychId'];
  const o={}; ids.forEach(k=>{const el=$('#'+k); if(el)o[k]=el.value;});
  o._editId = window._tradeEditId||'';
  o._lessonIds=(window._tradeLessonIds||[]).slice();
  window._tradeStash=o;
}
function restoreTradeForm(){
  const o=window._tradeStash; if(!o) return;
  window._tradeLessonIds=o._lessonIds||[];
  window._restoringTrade=true;
  // Pass the stashed values so the form repopulates synchronously — no setTimeout.
  openTradeForm(o._editId||undefined, o);
}
function quickAddPsychFromTrade(){
  stashTradeForm();
  window._afterPsychSave='returnToTrade';
  openPsychForm();
}
function quickAddLessonFromTrade(){
  stashTradeForm();
  window._afterLessonSave='returnToTrade';
  openLessonForm();
}

function opsChecklistProgress(){

}

function addOpsItem(listId,groupId){
  const txt=prompt('New checklist item:');
  if(!txt||!txt.trim())return;
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;
  const g=cl.groups.find(x=>x.id===groupId); if(!g)return;
  g.items.push({id:'i'+uid(),t:txt.trim()});
  save();renderView('library');
}
function editOpsItem(listId,groupId,itemId){
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;
  const g=cl.groups.find(x=>x.id===groupId); if(!g)return;
  const it=g.items.find(x=>x.id===itemId); if(!it)return;
  const txt=prompt('Edit checklist item:',it.t);
  if(txt==null)return;
  if(!txt.trim()){toast('Item cannot be empty','err');return;}
  it.t=txt.trim(); save();renderView('library');
}
function deleteOpsItem(listId,groupId,itemId){
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;
  const g=cl.groups.find(x=>x.id===groupId); if(!g)return;
  g.items=g.items.filter(x=>x.id!==itemId);
  if(state.opsChecklist) delete state.opsChecklist[itemId];
  save();renderView('library');
}
function addOpsGroup(listId){
  const name=prompt('New section name:');
  if(!name||!name.trim())return;
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;
  cl.groups.push({id:'g'+uid(),name:name.trim(),items:[]});
  save();renderView('library');
}
function editOpsGroup(listId,groupId){
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;
  const g=cl.groups.find(x=>x.id===groupId); if(!g)return;
  const name=prompt('Edit section name:',g.name);
  if(name==null)return; if(!name.trim()){toast('Name cannot be empty','err');return;}
  g.name=name.trim(); save();renderView('library');

function deleteOpsGroup(listId,groupId){
  const cl=opsLists().find(c=>c.id===listId); if(!cl)return;

function miniStat(k,v,cls){return `<div class="stat"><div class="k">${k}</div><div class="v ${cls}">${v}</div></div>`;}
function avgRR(closed){
  const rs=closed.map(rMultiple).filter(r=>r!=null);
  if(!rs.length)return '—';
  const wins=rs.filter(r=>r>0),losses=rs.filter(r=>r<0);
  if(!wins.length||!losses.length)return '—';
  const aw=wins.reduce((a,b)=>a+b,0)/wins.length;
  const al=Math.abs(losses.reduce((a,b)=>a+b,0)/losses.length);
  return '1 : '+(aw/al).toFixed(2);
}
function winRateBars(groups){
  // groups: {label:[trades]}
  const labels=Object.keys(groups);
  const wr=labels.map(k=>{const t=groups[k];const w=t.filter(x=>netPL(x)>0).length;return t.length?w/t.length*100:0;});
  const counts=labels.map(k=>groups[k].length);
  return {labels,wr,counts};
}
function barChart(ctxId,labels,data,counts,fmt){
  const ctx=$('#'+ctxId);if(!ctx)return;
  charts[ctxId]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,
    backgroundColor:data.map(v=>v>=50?'#4ade80aa':'#fbbf24aa'),borderColor:data.map(v=>v>=50?'#4ade80':'#fbbf24'),borderWidth:1,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>(fmt?fmt(c.parsed.y):c.parsed.y.toFixed(0)+'%')+(counts?'  ·  '+counts[c.dataIndex]+' trades':'')}}},
    scales:{x:baseScale(),y:baseScale({min:0,max:fmt?undefined:100,ticks:{color:'#8a94a6',font:CHART_FONT,callback:v=>fmt?fmt(v):v+'%'}})}}});
}
function drawSetupChart(closed){
  const g={};['A','B','C','D'].forEach(x=>g[x]=[]);
  closed.forEach(t=>{const k=t.setupGrade||'?';(g[k]=g[k]||[]).push(t);});
  Object.keys(g).forEach(k=>{if(!g[k].length)delete g[k];});
  const {labels,wr,counts}=winRateBars(g);
  barChart('aSetup',labels.map(l=>'Grade '+l),wr,counts);

function drawStratChart(closed){
  const g={};

}
function drawDowChart(closed){
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const g={};days.forEach(d=>g[d]=[]);
  closed.forEach(t=>g[days[new Date(t.datetime).getDay()]].push(t));
  const labels=days.filter(d=>g[d].length);
  const data=labels.map(d=>g[d].reduce((a,t)=>a+netPL(t),0));
  const counts=labels.map(d=>g[d].length);
  barChart('aDow',labels,data,counts,v=>moneyShort(v));

function drawHourChart(closed){
  const g={};
  closed.forEach(t=>{const h=new Date(t.datetime).getHours();(g[h]=g[h]||[]).push(t);});
  const labels=Object.keys(g).sort((a,b)=>a-b);
  const data=labels.map(h=>g[h].reduce((a,t)=>a+netPL(t),0));
  const counts=labels.map(h=>g[h].length);
  barChart('aHour',labels.map(h=>h+':00'),data,counts,v=>moneyShort(v));
}
function drawRChart(closed){
  const rs=closed.map(rMultiple).filter(r=>r!=null).sort((a,b)=>a-b);
  if(!rs.length){const ctx=$('#aR');if(ctx)ctx.parentElement.innerHTML='<div class="empty"><span>Add risk amounts to trades to see R-multiples.</span></div>';return;}
  const ctx=$('#aR');
  charts.aR=new Chart(ctx,{type:'bar',data:{labels:rs.map((_,i)=>i+1),datasets:[{data:rs,
    backgroundColor:rs.map(r=>r>=0?'#4ade80aa':'#f87171aa'),borderColor:rs.map(r=>r>=0?'#4ade80':'#f87171'),borderWidth:1,borderRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'R'}}},
    scales:{x:baseScale({ticks:{color:'#5b6577',font:CHART_FONT,maxTicksLimit:12}}),y:baseScale({ticks:{color:'#8a94a6',font:CHART_FONT,callback:v=>v+'R'}})}}});
}

function buildAIContext(){
  const m=computeMetrics();
  const recent=closedTradesSorted().slice(-25).map(t=>{
    const psych=t.psychId?state.psych.find(x=>x.id===t.psychId):null;
    const linkedLessons=(t.lessonIds||[]).map(id=>state.lessons.find(l=>l.id===id)).filter(Boolean);
    return {
      date:fmtDate(t.datetime),sym:t.symbol,dir:t.direction,strat:strategyName(t.strategyId),
      grade:t.setupGrade,entry:t.entry,stop:t.stop,exit:t.exit,risk:t.riskAmount,
      net:Number(netPL(t).toFixed(2)),R:rMultiple(t)!=null?Number(rMultiple(t).toFixed(2)):null,notes:t.notes,
      mindset: psych?{mood:psych.mood,confidence:psych.confidence,stress:psych.stress,energy:psych.energy,followedRules:psych.compliance}:null,
      lessons: linkedLessons.length?linkedLessons.map(l=>l.mistake):null
    };
  });
  const psych=state.psych.slice(-15).map(p=>({date:fmtDate(p.datetime),mood:p.mood,confidence:p.confidence,stress:p.stress,energy:p.energy,followedRules:p.compliance,note:p.note}));
  const lessons=state.lessons.slice(-10).map(l=>({cat:l.category,mistake:l.mistake,rootCause:l.rootCause,prevention:l.prevention}));
  return {
    summary:{currency:cur(),netCapital:m.capitalBase,deposits:m.deposits,withdrawals:m.withdrawals,currentEquity:Number(m.finalEquity.toFixed(2)),trades:m.n,winRate:Math.round(m.winRate),
      profitFactor:m.profitFactor===Infinity?'inf':Number(m.profitFactor.toFixed(2)),expectancy:Number(m.expectancy.toFixed(2)),
      expectancyR:m.expectancyR!=null?Number(m.expectancyR.toFixed(2)):null,netTotal:Number(m.netTotal.toFixed(2)),
      maxDrawdown:Number(m.maxDD.toFixed(2)),maxWinStreak:m.maxWinStreak,maxLossStreak:m.maxLossStreak,
      disciplineScore:m.disc,riskScore:m.riskScore},
    recentTrades:recent, psychology:psych, lessons:lessons
  };
}
const AI_PROMPTS={
  daily:'Act as a trading performance coach. Review the most recent trading day in the data. Give a concise daily review: what went well, what to watch, and one specific action for tomorrow.',
  weekly:'Act as a trading performance coach. Give a weekly review based on the data: key patterns, win rate and expectancy trends, and 2-3 priorities for next week.',
  monthly:'Act as a trading performance coach. Give a monthly performance review: overall trajectory, strengths, recurring weaknesses, and whether the trader is showing readiness to scale up risk or should keep position sizes small.',
  behaviour:'Act as a trading psychologist. Cross-reference the psychology log with trade outcomes. Identify behavioural patterns (e.g. does stress or low energy correlate with losses, signs of revenge trading or overtrading). Be specific and reference the data.',
  risk:'Act as a risk manager. Scan the data for risk red flags: oversized losses beyond planned risk, widening stops, loss streaks, missing risk amounts, low risk score. List concrete warnings ranked by severity.',
  improve:'Act as a trading mentor. Based on all the data, give a focused improvement plan: the single highest-leverage thing to fix first, then 2-3 supporting habits. Keep it practical and process-oriented.'
};
const AI_TITLES={daily:'Daily Review',weekly:'Weekly Review',monthly:'Monthly Review',behaviour:'Behaviour Analysis',risk:'Risk Warnings',improve:'Improvement Plan'};

async function runAI(kind){
  const m=computeMetrics();
  if(m.n===0 && state.psych.length===0){ toast('Log some trades first','warn'); return; }
  const out=$('#aiResult');
  out.innerHTML=`<div class="card"><div class="card-head"><h3>${AI_TITLES[kind]}</h3><span class="spinner" style="margin-left:auto"></span></div><div class="note-meta">Claude is analysing your data…</div></div>`;
  const ctx=buildAIContext();
  const sys='You are an experienced trading coach embedded in a trader\'s journal app. You give honest, specific, process-focused feedback grounded in the data provided. You are not a financial advisor and never give buy/sell recommendations or predictions. Be concise and direct. Use short paragraphs and where helpful a few bullet points. The trader is a disciplined beginner from an IT operations background building good habits. Keep total response under 350 words. Structure with brief bold section labels where natural.';
  const userMsg=`${AI_PROMPTS[kind]}\n\nHere is the trader's data as JSON:\n${JSON.stringify(ctx,null,1)}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1100,system:sys,messages:[{role:'user',content:userMsg}]})
    });
    if(!resp.ok){throw new Error('HTTP '+resp.status);}
    const data=await resp.json();
    const text=(data.content||[]).map(b=>b.type==='text'?b.text:'').join('\n').trim();
    window._aiLastText=text;
    out.innerHTML=`<div class="card">
      <div class="card-head"><h3>${AI_TITLES[kind]}</h3><span class="card-sub">${fmtDate(Date.now())}</span>
        <div class="actions"><button class="btn btn-ghost btn-sm" onclick="copyText(this,window._aiLastText)">Copy</button></div>
      </div>
      <div class="ai-out">${formatAI(text)}</div>
      <div class="note-meta" style="margin-top:12px">Generated by Claude · not financial advice</div>
    </div>`;
  }catch(e){
    out.innerHTML=`<div class="card"><div class="ai-out">Couldn't reach the AI service right now (${esc(e.message)}). This feature needs a live connection to Anthropic's API. If you're running this file opened directly from disk, some browsers block the request — try again, or check your connection.</div></div>`;
  }
}
function formatAI(t){
  return esc(t)
    .replace(/\*\*(.+?)\*\*/g,'<h4>$1</h4>')
    .replace(/^[-•]\s+(.+)$/gm,'• $1');
}
function copyText(btn,txt){ navigator.clipboard.writeText(txt).then(()=>{btn.textContent='Copied';setTimeout(()=>btn.textContent='Copy',1500);}); }

        <button class="btn btn-danger" onclick="clearTrades()">Delete all trades</button>
        <button class="btn btn-danger" onclick="wipeAll()">Reset everything</button>
      </div>
    </div>
  </div>`;
}
function saveSettings(){
  state.settings.account=$('#set_account').value.trim()||'Trader';
  state.settings.currency=$('#set_currency').value.trim()||'SGD';
  state.settings.riskPerTradePct=Number($('#set_risk').value)||1;
  save();toast('Settings saved');renderView('settings');
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='tradeops-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(url);
  state._dirtySinceExport=false;
  state.lastExport={count:state.trades.length, at:Date.now()};
  _origSave();
  bannerDismissed=false;
  updateBackupBanner();
  toast('Backup downloaded');
}
function importData(input){
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data || typeof data!=='object' || !('trades' in data)) throw new Error('Not a valid backup file');
      confirmDialog(`Restore from "${file.name}"? This replaces all current data (${state.trades.length} trades) with the backup (${(data.trades||[]).length} trades).`,()=>{
        state=migrate(data); pruneDanglingLinks(); save(); buildNav(); go('dashboard'); toast('Backup restored');
      },false);
    }catch(err){ toast('Import failed: '+err.message,'err'); }
    input.value='';
  };
  reader.readAsText(file);
}
// Strip references to psych/lesson records that don't exist (e.g. hand-edited backups)
function pruneDanglingLinks(){
  const psychIds=new Set(state.psych.map(p=>p.id));
  const lessonIds=new Set(state.lessons.map(l=>l.id));
  state.trades.forEach(t=>{
    if(t.psychId && !psychIds.has(t.psychId)) t.psychId=null;
    if(Array.isArray(t.lessonIds)) t.lessonIds=t.lessonIds.filter(id=>lessonIds.has(id));
  });
}
function exportCSV(){
  if(!state.trades.length){toast('No trades to export','warn');return;}
  const cols=['datetime','symbol','assetClass','direction','strategy','setupGrade','entry','stop','target','exit','size','riskAmount','commission','grossPL','netPL','rMultiple','notes',
    'linkedMood','linkedConfidence','linkedStress','linkedEnergy','linkedFollowedRules','linkedLessons'];
  const rows=state.trades.slice().sort((a,b)=>(a.datetime||0)-(b.datetime||0)).map(t=>{
    const r=rMultiple(t);
    const psych=t.psychId?state.psych.find(x=>x.id===t.psychId):null;
    const lessons=(t.lessonIds||[]).map(id=>{const l=state.lessons.find(x=>x.id===id);return l?(l.mistake||'lesson'):'';}).filter(Boolean);
    return [new Date(t.datetime).toISOString(),t.symbol,t.assetClass,t.direction,strategyName(t.strategyId),t.setupGrade,
      t.entry,t.stop,t.target,t.exit,t.size,t.riskAmount,t.commission,t.grossPL,netPL(t),r!=null?r.toFixed(3):'',(t.notes||'').replace(/\n/g,' '),
      psych?psych.mood:'', psych?psych.confidence:'', psych?psych.stress:'', psych?psych.energy:'', psych?psych.compliance:'',
      lessons.join(' | ').replace(/\n/g,' ')];
  });
  const csv=[cols.join(',')].concat(rows.map(r=>r.map(v=>{
    if(v==null)return '';
    const s=String(v);
    return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;
  }).join(','))).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='tradeops-trades-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV exported');
}

/* ---------- Multi-sheet Excel workbook ---------- */
function exportXLSX(){
  if(typeof XLSX==='undefined'){ toast('Excel library not loaded — check your connection','err'); return; }
  const m=computeMetrics();
  const wb=XLSX.utils.book_new();

  // Summary sheet
  const summary=[
    ['Trading Operations — Workbook'],
    ['Account', state.settings.account],
    ['Currency', cur()],
    ['Generated', new Date().toLocaleString()],
    [],
    ['CAPITAL'],
    ['Total deposited', m.deposits],
    ['Total withdrawn', m.withdrawals],
    ['Net capital', m.capitalBase],
    ['Trading P/L', m.netTotal],
    ['Current equity', m.finalEquity],
    [],
    ['PERFORMANCE'],
    ['Closed trades', m.n],
    ['Win rate %', Number(m.winRate.toFixed(1))],
    ['Profit factor', m.profitFactor===Infinity?'inf':Number(m.profitFactor.toFixed(2))],
    ['Expectancy', Number(m.expectancy.toFixed(2))],
    ['Expectancy (R)', m.expectancyR!=null?Number(m.expectancyR.toFixed(2)):''],
    ['Total return %', Number(m.totalReturnPct.toFixed(1))],
    ['Max drawdown', Number(m.maxDD.toFixed(2))],
    ['Max win streak', m.maxWinStreak],
    ['Max loss streak', m.maxLossStreak],
    ['Discipline score', m.disc!=null?m.disc:''],
    ['Risk score', m.riskScore!=null?m.riskScore:'']
  ];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summary), 'Summary');

  // Trades sheet (with linkage)
  const tradeRows=state.trades.slice().sort((a,b)=>(a.datetime||0)-(b.datetime||0)).map(t=>{
    const r=rMultiple(t);
    const psych=t.psychId?state.psych.find(x=>x.id===t.psychId):null;
    const lessons=(t.lessonIds||[]).map(id=>{const l=state.lessons.find(x=>x.id===id);return l?l.mistake:'';}).filter(Boolean);
    return {
      Date:new Date(t.datetime).toLocaleString(), Symbol:t.symbol, 'Asset Class':t.assetClass, Direction:t.direction,
      Strategy:strategyName(t.strategyId), 'Setup Grade':t.setupGrade, Entry:t.entry, Stop:t.stop, Target:t.target,
      Exit:t.exit, 'Qty':t.size, 'Risk Amount':t.riskAmount, Commission:t.commission, 'Gross P/L':t.grossPL,
      'Net P/L':netPL(t), 'R Multiple':r!=null?Number(r.toFixed(3)):'', Notes:t.notes,
      'Linked Mood':psych?psych.mood:'', 'Linked Confidence':psych?psych.confidence:'', 'Linked Stress':psych?psych.stress:'',
      'Linked Energy':psych?psych.energy:'', 'Followed Rules':psych?psych.compliance:'', 'Linked Lessons':lessons.join(' | ')
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tradeRows.length?tradeRows:[{Date:'(no trades)'}]), 'Trades');

  // Capital sheet
  const capRows=(state.capital||[]).slice().sort((a,b)=>(a.datetime||0)-(b.datetime||0)).map(c=>({
    Date:new Date(c.datetime).toLocaleString(), Type:c.type, Amount:Number(c.amount)||0, Note:c.note||''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(capRows.length?capRows:[{Date:'(none)'}]), 'Capital');

  // Psychology sheet
  const psychRows=state.psych.slice().sort((a,b)=>(a.datetime||0)-(b.datetime||0)).map(p=>({
    Date:new Date(p.datetime).toLocaleString(), Mood:p.mood, Confidence:p.confidence, Stress:p.stress, Energy:p.energy,
    'Followed Rules':p.compliance, Reflection:p.note||''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(psychRows.length?psychRows:[{Date:'(none)'}]), 'Psychology');

  // Lessons sheet
  const lessonRows=state.lessons.slice().sort((a,b)=>(a.created||0)-(b.created||0)).map(l=>({
    Date:fmtDate(l.created), Category:l.category, Mistake:l.mistake, 'Root Cause':l.rootCause, Resolution:l.resolution, Prevention:l.prevention,
    'Linked Trades':tradesLinkingLesson(l.id).map(t=>t.symbol+' '+fmtDate(t.datetime)).join(' | ')
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(lessonRows.length?lessonRows:[{Date:'(none)'}]), 'Lessons');

  XLSX.writeFile(wb, 'tradeops-workbook-'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('Excel workbook exported');
}
function clearTrades(){
  confirmDialog('Delete ALL trades permanently? Strategies, lessons and notes are kept. Export a backup first if unsure.',()=>{
    state.trades=[];save();buildNav();toast('All trades deleted','warn');go('dashboard');
  },true);
}
function wipeAll(){
  confirmDialog('Reset the ENTIRE app to empty? This erases trades, strategies, psychology log, lessons, library and reviews. This cannot be undone.',()=>{
    state=blankState();save();buildNav();toast('Everything reset','warn');go('dashboard');
  },true);
}

/* ============================================================
   BACKUP REMINDER BANNER
   ============================================================ */
let bannerDismissed=false;
const BACKUP_THRESHOLD=5; // new trades since last export before nudging
function unexportedCount(){
  const last = state.lastExport ? state.lastExport.count : 0;
  return Math.max(0, state.trades.length - last);
}
function updateBackupBanner(){
  const el=document.getElementById('backupBanner');
  if(!el) return;
  const n=unexportedCount();
  const never = !state.lastExport;
  const show = !bannerDismissed && state.trades.length>0 && (n>=BACKUP_THRESHOLD || (never && state.trades.length>=BACKUP_THRESHOLD));
  if(show){
    const txt = never
      ? `You've logged <b>${state.trades.length} trades</b> and never backed up. Your data lives only in this browser — export a copy to keep it safe.`
      : `<b>${n} new trade${n>1?'s':''}</b> since your last backup. Export now so you don't lose them if this browser's data is cleared.`;
    document.getElementById('backupBannerText').innerHTML=txt;
    el.classList.add('show');
  }else{
    el.classList.remove('show');
  }
}
function dismissBackupBanner(){
  bannerDismissed=true;
  updateBackupBanner();
}

/* ============================================================
   INIT
   ============================================================ */
window.addEventListener('beforeunload',e=>{
  if(state.settings.autoRemind && state._dirtySinceExport && unexportedCount()>0){
    e.preventDefault(); e.returnValue='';
  }
});
const _origSave=save;
save=function(){ state._dirtySinceExport=true; _origSave(); };

buildNav();
go('dashboard');
updateBackupBanner();

// Register service worker for installability (only when served over http/https, not file://)
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
